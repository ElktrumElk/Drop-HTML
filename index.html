<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/style1.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=DM+Serif+Text:ital@0;1&family=Kablammo&family=Lavishly+Yours&family=PT+Serif+Caption:ital@0;1&family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&family=Tangerine:wght@400;700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
    rel="stylesheet">

</head>

<body class="dark">

  <div class="app">
    <header id="header" class="header">
      <div class="logo_cnt">
        <img class="logoIcon" />
        <h1 class="logoName kablammo-logo">DropH</h1>
        <div id="hamBugger"></div>
      </div>

      <div class="project_name_cnt">
        <input id="project-name" class="project_name" value="untitled" />
      </div>

      <div class="project_name_cnt">
        <button class="run_btn">
          <img class="run_ic" src="https://img.icons8.com/?size=100&id=9978&format=png&color=03303f" />
        </button>
      </div>
    </header>

    <aside class="explorer">

      <div class="ex-gutter">
        <div id="project-folder">
          <img class="side_ic" src="https://img.icons8.com/?size=100&id=74359&format=png&color=7a7a7a" />
        </div>
        <div id="search">
          <img class="side_ic" src="https://img.icons8.com/?size=100&id=nMLrSrmuMIA9&format=png&color=7a7a7a" />
        </div>
        <div id="git-section">
          <img class="side_ic" src="https://img.icons8.com/?size=100&id=106567&format=png&color=7a7a7a" />
        </div>
      </div>

      <div class="side_bar_cnt">
        <div class="side_bar_header">
          <div class="current_sec_name">
            <h2>Explorer</h2>
          </div>


          <div class="side_bar_cnt_child">
            <img src="https://img.icons8.com/?size=100&id=nMLrSrmuMIA9&format=png&color=7a7a7a"
              alt="search_in_project" />
          </div>
        </div>

        <div id="open_folder_cnt" class="open_folder_cnt">
          <p class="info_txt">
            By opening a folder you give right to DropH to read and write directly in your storage within the folder and
            it children
          </p>
          <button id="open_folder" class="open_folder_btn">Open Folder </button>
        </div>

        <div class="file_cnt">
          <ul id="file_cnt_ui" class="file_lists_cnt">
          </ul>
        </div>
      </div>

      <div class="resizer_border resizer_border_hover"></div>
    </aside>


    <div class="editorFrame">
      <div id="ed-file-tab-cnt" class="file_tabs_cnt">

        <button class="tabs active">
          <img src="https://img.icons8.com/?size=100&id=11260&format=png&color=ff7f50" />
          <span>Index.html</span>
          <img src="https://img.icons8.com/?size=100&id=71200&format=png&color=7a7a7a" />
        </button>

      </div>

      <div id="editor_panel" class="editor">

        <h2 class="dp">DROP H</h2>
        <div class="dp_btn_cnt">
          <button id="dp-open-folder-btn" class="dp_open_f_btn">Open Folder <span>ctrl+k+o</span></button>
        </div>

      </div>

      <div id="terminal_cnt" class="terminal">
        <div class="resizer_border_2 resizer_border_hover"></div>
      </div>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.0/beautify-html.min.js"></script>

  <script src="./src/main.js" type="module"></script>


</body>

</html>
