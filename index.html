<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=DM+Serif+Text:ital@0;1&family=Kablammo&family=Lavishly+Yours&family=PT+Serif+Caption:ital@0;1&family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&family=Tangerine:wght@400;700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
    rel="stylesheet">
</head>

<body>

  <div class="app">
    <header class="header">
      <div class="logo_cnt">
        <img class="logoIcon" />
        <h1 class="logoName kablammo-logo">DropH</h1>
      </div>

      <div class="project_name_cnt">
        <input class="project_name" value="untitled" />
      </div>

      <div class="project_name_cnt">
        <button class="run_btn">
          <img class="run_ic" src="https://img.icons8.com/?size=100&id=9978&format=png&color=03303f" />
        </button>
      </div>
    </header>

    <aside class="explorer">
      <div class="ex-gutter">
        <div id="project-folder">
          <img class="side_ic" src="https://img.icons8.com/?size=100&id=74359&format=png&color=7a7a7a" />
        </div>
        <div id="search">
          <img class="side_ic" src="https://img.icons8.com/?size=100&id=nMLrSrmuMIA9&format=png&color=7a7a7a" />
        </div>
        <div id="git-section">
          <img class="side_ic" src="https://img.icons8.com/?size=100&id=106567&format=png&color=7a7a7a" />
        </div>
      </div>

      <div class="side_bar_cnt">
        <div class="side_bar_header">
          <div class="current_sec_name">
            <h2>Explorer</h2>
          </div>

          <div class="side_bar_cnt_child">
            <img src="https://img.icons8.com/?size=100&id=nMLrSrmuMIA9&format=png&color=000000" />
          </div>
        </div>

        <div class="open_folder_cnt">
          <p class="info_txt">
            By opening a folder you give right to DropH to read and write directly in your storage within the folder and
            it children
          </p>
          <button class="open_folder_btn">Open Folder</button>
        </div>
      </div>
    </aside>


    <div class="editorFrame">
      <div class="file_tabs_cnt">
        <button class="tabs"></button>
      </div>
      <div id="editor-container" class="editorFrame"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.0/beautify-html.min.js"></script>

  <script src="./src/main.js" type="module"></script>


</body>

</html>
